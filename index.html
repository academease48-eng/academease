<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AcademEase — Upgrade in Progress</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0a0f1e;
      color: #f0efea;
      min-height: 100vh;
    }
    .page {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 3rem 1.5rem;
      text-align: center;
    }
    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(55,138,221,0.12);
      border: 0.5px solid rgba(55,138,221,0.35);
      color: #85b7eb;
      font-size: 12px;
      font-weight: 500;
      letter-spacing: 0.08em;
      padding: 5px 16px;
      border-radius: 100px;
      margin-bottom: 2.5rem;
      text-transform: uppercase;
    }
    .pulse {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: #378add;
      animation: pulse 2s infinite;
      flex-shrink: 0;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.4; transform: scale(0.7); }
    }
    .logo-mark {
      width: 68px; height: 68px;
      border-radius: 16px;
      background: rgba(55,138,221,0.1);
      border: 0.5px solid rgba(55,138,221,0.25);
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 2rem;
    }
    .logo-mark i { font-size: 32px; color: #378add; }
    h1 {
      font-size: clamp(26px, 5vw, 44px);
      font-weight: 600;
      color: #f0efea;
      line-height: 1.2;
      letter-spacing: -0.02em;
      margin-bottom: 1.25rem;
    }
    h1 span { color: #378add; }
    .sub {
      font-size: 16px;
      color: #5f5e5a;
      line-height: 1.8;
      max-width: 400px;
      margin: 0 auto 2.75rem;
    }
    .cta {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      background: #378add;
      color: #fff;
      font-size: 15px;
      font-weight: 500;
      padding: 0.85rem 2rem;
      border-radius: 10px;
      text-decoration: none;
      transition: background 0.15s, transform 0.1s;
    }
    .cta:hover { background: #185fa5; transform: translateY(-1px); }
    .cta:active { transform: translateY(0); }
    .cta i { font-size: 17px; }
    .note {
      margin-top: 2.5rem;
      font-size: 13px;
      color: #2c2c2a;
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="eyebrow">
      <span class="pulse"></span>
      Upgrade in progress
    </div>
    <div class="logo-mark">
      <i class="ti ti-school"></i>
    </div>
    <h1>AcademEase is being<br><span>upgraded</span></h1>
    <p class="sub">
      The system is fully operational.<br>We're refining the interface  back shortly.
    </p>
    <a class="cta" href="https://script.google.com/macros/s/AKfycbw5aG84Eiq7VmUwACVwbhhT_SIsUY9T15n1HzCqnK8vegCOecgZNr8IhRfUjNQ42PosuQ/exec?page=index" target="_blank" rel="noopener noreferrer">
      <i class="ti ti-bolt"></i>
      Meanwhile click here to use the current system
    </a>
    <p class="note">All data and access remain intact.</p>
  </div>
</body>
</html>
